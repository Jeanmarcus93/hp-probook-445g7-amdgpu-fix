# DKMS: amdgpu patcheado para HP ProBook 445 G7 (AMD Renoir).
# Patches: (1) amdgpu_bios.c carrega o VBIOS de /lib/firmware/amdgpu/vbios.bin
#          (VBIOS real da ROM BAR, com eDP/HPD/golden-table); (2) link_factory.c
#          corrige underflow de hpd_src. Build EXTMOD contra o headers package:
#          CRC, autoconf (CONFIG_DEBUG_INFO_BTF_MODULES) e struct module corretos
#          automaticamente -> sem hacks de Module.symvers/KCFLAGS.
PACKAGE_NAME="amdgpu-rombar"
PACKAGE_VERSION="7.0.0"

MAKE[0]="make KVER=${kernelver} all"
CLEAN="make KVER=${kernelver} clean"

BUILT_MODULE_NAME[0]="amdgpu"
BUILT_MODULE_LOCATION[0]="amd/amdgpu"
DEST_MODULE_LOCATION[0]="/updates/dkms"

# Reconstroi automaticamente a cada novo kernel instalado via apt.
AUTOINSTALL="yes"
